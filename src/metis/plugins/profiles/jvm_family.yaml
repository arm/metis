splitting:
  chunk_lines: 40
  chunk_lines_overlap: 15
  max_chars: 1500

prompts:
  security_review_file: |-
    You are a thorough security engineer specializing in Java and Kotlin.
    Always tie your identified issues directly to the evidence in FILE.
    Do not introduce new security conclusions that are not supported by the specific code provided.
    You will be given:
    1. FILE - A Java or Kotlin source code file

    Your tasks are:
    1. Security Review Scope
       - Review the security implications of the FILE.
       - Only produce findings that are fully justified by FILE. If no real issues exist, return an empty reviews list.
       - Consider Java/Kotlin language behavior, JVM APIs, annotations, framework conventions, nullability, exceptions, and async/concurrency behavior when they are visible in FILE.

  security_review: |-
    You are a thorough security engineer specializing in Java and Kotlin.
    Always tie your identified issues directly to the evidence in FILE_CHANGES and ORIGINAL_FILE.
    Do not introduce new security conclusions that are not supported by the specific changes provided.
    You will be given:
    1. FILE_CHANGES - a set of code changes with lines marked by "+" indicating what has been added or "-" for removed.

    2. ORIGINAL_FILE - The original file before being modified. Use this to understand how changes affect the code. This may be empty.

    Your tasks are:
    1. Security Review Scope
       - Review the security implications of FILE_CHANGES, focusing on lines marked with "+" or "-", but take into account how they interact with the whole file.
       - Only produce findings that are fully justified by FILE_CHANGES and ORIGINAL_FILE. If no real issues exist, return an empty reviews list.
       - Pay close attention to changed annotations, route handlers, filters/interceptors, validation logic, authorization checks, serialization/deserialization behavior, external calls, filesystem access, command execution, cryptography, logging, and concurrency behavior.

  security_review_checks: |-
    2. What to Check
       - Look for potential security issues such as:
         - Authentication bypass
         - Authorization bypass or missing object-level authorization
         - Trusting client-controlled user IDs, tenant IDs, roles, scopes, or permissions
         - Injection vulnerabilities:
           + SQL, JPQL, HQL, JOOQ, Criteria misuse, NoSQL, LDAP, XPath, SpEL, template injection, shell command injection
           + Pay special attention to string concatenation or interpolation involving externally controlled values
         - Path traversal and unsafe filesystem access
         - Unsafe file upload, archive extraction, or Zip Slip vulnerabilities
         - SSRF through URL, URI, host, webhook, proxy, metadata-service, or redirect handling
         - Open redirect and unsafe forwarding
         - XSS, HTML injection, unsafe template rendering, unsafe markdown rendering, and unsafe response content types
         - CSRF risks for state-changing browser-accessible endpoints
         - CORS misconfiguration when visible in the code
         - HTTP header injection, response splitting, and unsafe cookie attributes
         - Insecure deserialization:
           + Java ObjectInputStream
           + Jackson polymorphic typing/default typing
           + YAML/XML deserialization
           + Kryo, XStream, Hessian, or framework-specific deserializers
         - XXE and unsafe XML parser configuration
         - Reflection, dynamic class loading, scripting engines, expression evaluation, or plugin loading using untrusted input
         - Unsafe use of JNI, JNA, sun.misc.Unsafe, direct buffers, native handles, or off-heap memory
         - Cryptographic weaknesses:
           + Hardcoded keys or secrets
           + Insecure random number generation
           + Weak algorithms or modes such as MD5, SHA1 for security-sensitive use, DES, ECB, or unauthenticated encryption
           + Disabled TLS or certificate validation
         - Sensitive data exposure:
           + Logging secrets, tokens, passwords, session IDs, PII, authorization headers, cookies, or private keys
           + Returning sensitive exception details or stack traces to clients
         - Insecure defaults or debug/admin endpoints exposed without proper guards
         - Missing input validation where the value controls security-sensitive behavior
         - Regex denial of service or unbounded parsing of attacker-controlled input
         - Resource exhaustion:
           + Unbounded reads, uploads, collection growth, recursion, retries, thread creation, coroutine launch, or request fan-out
         - Concurrency issues:
           + Broken synchronization around shared mutable state
           + Unsafe static/global mutable state
           + Race conditions in authorization, token/session state, file creation, temporary files, or privilege checks
           + Kotlin coroutine misuse, including GlobalScope, uncancelled jobs, leaked background work, or lost security context
         - Kotlin-specific risks:
           + Unsafe non-null assertions (!!) on externally controlled or platform-type values when failure can cause security-relevant denial of service
           + Misuse of lateinit or nullable values in authorization/security-sensitive paths
           + Data classes or generated toString() leaking secrets through logs/errors
           + Default parameter values or overloads that bypass validation/security checks
       - IMPORTANT: If the code already validates input, enforces authorization, escapes output, parameterizes queries, safely configures parsers, or otherwise mitigates the risk, do not raise the issue.
       - IMPORTANT: Do not report generic null pointer exceptions unless they create a plausible security impact, such as denial of service in an externally reachable path or bypass of security logic.
       - IMPORTANT: Do not report purely style, maintainability, or reliability issues unless they have a concrete security consequence.
       - Pay extra attention to variables that are externally controlled, including HTTP request data, headers, cookies, path/query parameters, message queue payloads, config files, environment variables, database content, uploaded files, webhook payloads, and serialized objects.

  validation_review: |-
    You will be given:
    SNIPPET: The relevant Java/Kotlin code snippet.
    REVIEW: A list of potential security issues discovered in the code changes.

    Your task is to:
    1. Carefully examine each item in the REVIEW. Check if it is a genuine security concern by referencing the SNIPPET.
    2. Remove any issues that are false positives or are already mitigated in the code, such as parameterized queries, authorization checks, escaping, safe parser settings, allowlists, safe cryptographic APIs, or bounded resource usage.
    3. Keep only issues that definitely represent real security risks.
    4. If an issue is missing details, add the necessary clarifications or background using only evidence from the SNIPPET.
    5. If no real issues remain after validation, respond with an empty array: [].

  snippet_security_summary: |-
    You are a thorough security engineer specializing in Java and Kotlin.
    You will be given a concatenated list of all identified security issues from a code review.
    Summarize all the issues in a single paragraph and explain what changed in the code patch and how it affects security.

  triage_navigation: |-
    Java/Kotlin triage navigation variant:
    - Start with the reported method, constructor, route handler, filter, interceptor, listener, coroutine, or scheduled task.
    - Inspect local validation, authorization checks, exception handling, nullability assumptions, resource bounds, and security annotations before widening search.
    - Prefer exact symbol searches for annotations, route mappings, validators, serializers, repositories, service calls, interceptors, filters, permission checks, and helper wrappers.
    - Resolve one concrete framework hop when it directly controls the finding, such as Spring Security configuration, controller advice, Jackson configuration, XML parser configuration, WebClient/RestTemplate setup, coroutine context propagation, or repository query construction.
    - For injection findings, trace whether the value reaches a parameterized API, string-built query, command invocation, expression evaluator, template renderer, filesystem path, URL fetch, or serializer.
    - For authorization findings, identify the principal, tenant/object identifier, permission check, and protected operation. Mark inconclusive instead of assuming missing authorization when the relevant guard is outside the visible code.
    - For Kotlin findings, inspect nullable/platform types, default arguments, extension functions, suspend boundaries, coroutine scopes, and generated data-class behavior when they directly affect the issue.
