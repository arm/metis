psql_database:
  provider: "config"
  credentials:
    username: "metis_user"
    password: "metis_password"
    host: "localhost"
    port: 5432
    database_name: "metis_db"

metis_engine:
  max_token_length: 250000
  max_workers: 5
  embed_dim: 3072

llm_provider:
  name: "bedrock_mantle"
  model: "anthropic.<claude-model-id>"
  aws_profile: "<aws-profile>"
  aws_region: "<aws-region>"
  code_embedding_model: "text-embedding-3-large"
  docs_embedding_model: "text-embedding-3-large"
  embedding_api_key_env: "OPENAI_API_KEY"

query:
  similarity_top_k: 5
  max_tokens: 5000
  temperature: 0.0
