llm_provider:
  name: "gemini"
  model: "gemini-2.5-flash"
  api_key_env: "GOOGLE_API_KEY"

# Optional — only needed when the index tool is enabled.
embedding_provider:
  name: "openai"
  code_embedding_model: "text-embedding-3-large"
  docs_embedding_model: "text-embedding-3-large"

metis_engine:
  embed_dim: 3072

query:
  max_tokens: 5000
  temperature: 0.0
